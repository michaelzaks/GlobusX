<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1226"/>
      <stop offset="1" stop-color="#070b18"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.85" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#5b9dff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#5b9dff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.1" cy="1" r="0.7">
      <stop offset="0" stop-color="#3ad0c9" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#3ad0c9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ocean" cx="0.4" cy="0.34" r="0.78">
      <stop offset="0" stop-color="#2a6bd6"/>
      <stop offset="0.55" stop-color="#16447f"/>
      <stop offset="1" stop-color="#0b2347"/>
    </radialGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3ad0c9"/>
      <stop offset="1" stop-color="#5b9dff"/>
    </linearGradient>
    <clipPath id="globe"><circle cx="950" cy="315" r="232"/></clipPath>
  </defs>
  <rect width="1200" height="630" fill="#0a1022"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="120" cy="90" r="2" opacity="0.7"/><circle cx="300" cy="60" r="1.6" opacity="0.5"/>
    <circle cx="520" cy="120" r="1.4" opacity="0.5"/><circle cx="240" cy="200" r="1.6" opacity="0.4"/>
    <circle cx="80" cy="320" r="1.8" opacity="0.5"/><circle cx="160" cy="500" r="2" opacity="0.6"/>
    <circle cx="420" cy="540" r="1.5" opacity="0.45"/><circle cx="600" cy="470" r="1.6" opacity="0.4"/>
    <circle cx="1140" cy="540" r="2" opacity="0.6"/><circle cx="1080" cy="120" r="1.6" opacity="0.5"/>
    <circle cx="700" cy="80" r="1.4" opacity="0.4"/><circle cx="60" cy="180" r="1.4" opacity="0.4"/>
  </g>
  <!-- globe -->
  <circle cx="950" cy="315" r="252" fill="none" stroke="#3a78ff" stroke-opacity="0.22" stroke-width="14"/>
  <circle cx="950" cy="315" r="232" fill="url(#ocean)"/>
  <g clip-path="url(#globe)" fill="#2f9e6d">
    <path d="M835 175 q56 -38 116 -18 q48 16 30 64 q-14 40 -66 40 q-60 4 -88 -30 q-22 -30 8 -56 Z"/>
    <path d="M965 270 q60 -14 96 18 q36 32 8 78 q-28 40 -88 34 q-62 -6 -70 -54 q-8 -54 54 -76 Z"/>
    <path d="M812 390 q46 -22 82 8 q30 28 6 66 q-26 36 -78 30 q-46 -6 -52 -50 q-2 -38 42 -54 Z"/>
  </g>
  <ellipse cx="880" cy="245" rx="78" ry="46" fill="#ffffff" opacity="0.12"/>
  <!-- target marker on globe -->
  <g transform="translate(1010,250)">
    <circle r="30" fill="none" stroke="url(#acc)" stroke-width="7"/>
    <circle r="7" fill="url(#acc)"/>
  </g>
  <!-- text -->
  <text x="84" y="232" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="26" letter-spacing="5" fill="#3ad0c9">DAILY GEOGRAPHY GAME</text>
  <text x="80" y="345" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-weight="800" font-size="118" letter-spacing="-1">
    <tspan fill="#ffffff">Globus</tspan><tspan fill="url(#acc)">X</tspan>
  </text>
  <text x="84" y="410" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="38" fill="#aeb9da">Tap the globe. Guess the place.</text>
  <text x="84" y="478" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="28" fill="#7f8db3">3 · 5 · 10 stops &#8212; how far can you get?</text>
</svg>
